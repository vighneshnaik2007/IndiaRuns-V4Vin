# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"
  - "Gemini 3.1 Flash-Lite"

ai_usage_summary: |
  Used Claude and Gemini 3.1 Flash-Lite for architecture discussion, code review, and debugging.
  No candidate data was fed to any LLM. All scoring logic, embeddings,
  and ranking pipeline were written and executed locally.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid AI scoring system with four components:
  1. Semantic similarity (55% weight): Used a two-stage process; FAISS 
     screening with 'all-MiniLM-L6-v2' followed by MPNet deep precision 
     re-ranking to convert job description and 1,00,000 candidate profiles 
     into vector embeddings, measuring cosine similarity beyond keywords.
  2. Behavioral signal scoring (25% weight): Leveraged 23 Redrob platform 
     signals including login recency, recruiter response rate, profile 
     completeness, saved by recruiters, and interview completion rate to 
     assess candidate engagement.
  3. Rule-based scoring (20% weight): Applied JD-specific rules — bonus 
     for 5-9 years experience, preferred locations, and AI/ML relevance; 
     penalty for consulting-only backgrounds (TCS, Infosys, Wipro, etc.).
  4. Final Optimization & Compliance: Applied diversity-aware location 
     adjustments and mandatory validator tie-breaking (Score DESC, ID ASC).
  Embeddings are precomputed offline (~150 min) and saved as numpy arrays. 
  Final ranking runs in under 2 minutes on CPU within 16GB RAM.

